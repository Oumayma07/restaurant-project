<div class="reservation-page">

  <h2>🍽 Gestion des Réservations</h2>



  <!-- Table Card -->
  <div class="table-card">
    <table class="table-admin">
      <thead>
        <tr>
          <th>Client</th>
          <th>Email</th>
          <th>Personnes</th>
          <th>Date</th>
          <th>Heure</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let r of reservations ">
          <td>
            <div class="client">
              <div class="avatar">{{ r.nom[0] }}</div>
              {{ r.nom }}
            </div>
          </td>

          <td>{{ r.email }}</td>

          <td>
            <span class="badge people">{{ r.nbPersonnes }} pers</span>
          </td>

          <td>{{ r.dateReservation | date:'dd/MM/yyyy' }}</td>

          <td>
            <span class="badge time">{{ r.heure || '—' }}</span>
          </td>

          <td>
            <button class="btn-delete" (click)="deleteReservation(r.id)">🗑 Supprimer</button>
          </td>
        </tr>
      </tbody>

    </table>
  </div>

</div>
