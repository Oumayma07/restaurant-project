<div class="avis-container">
  <h2>Les avis de nos clients</h2>

  <div class="avis-form">
    <input [(ngModel)]="newAvis.nom" type="text" placeholder="Votre nom">

    <select [(ngModel)]="newAvis.note">
      <option value="0" disabled selected>Note</option>
      <option *ngFor="let n of [1,2,3,4,5]" [value]="n">{{n}} ⭐</option>
    </select>

    <textarea [(ngModel)]="newAvis.commentaire" placeholder="Votre commentaire..."></textarea>

    <button (click)="ajouterAvis()">Envoyer</button>
  </div>

  <div class="avis-list">
    <div class="avis-card" *ngFor="let avis of avisList">
      <h3>{{avis.nom}} <span>({{avis.note}} ⭐)</span></h3>
      <p>{{avis.commentaire}}</p>
      <small>{{avis.date | date:'medium'}}</small>
    </div>
  </div>
</div>
