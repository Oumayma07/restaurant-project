<div class="menu-page">

  <!-- Overlay sombre -->
  <div class="overlay"></div>
    <!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top navbar-transparent">
  <div class="container">
    
    <!-- Logo -->
    <a class="navbar-brand" routerLink="/home">
      Ô Délices
    </a>

    <!-- Burger menu -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse justify-content-end" id="mainNavbar">
      <ul class="navbar-nav align-items-center gap-3">

        <li class="nav-item">
          <a class="nav-link" routerLink="/home">Accueil</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/menu">Menu</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/about">À propos</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/avis">Avis</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/contact">Contact</a>
        </li>

        <!-- Bouton Réserver -->
        <li class="nav-item">
          <button class="btn btn-outline-light px-4" (click)="goToReservation()">
            Réserver
          </button>
        </li>

      </ul>
    </div>
  </div>
</nav>
  <!-- Header du menu -->
  <div class="menu-header text-center text-white">
    <h2 class="fw-bold mb-3">Notre Menu Étoilé</h2>
    <p class="lead text-white-50 mb-5">Savourez l’expérience culinaire ultime avec nos plats raffinés.</p>
  </div>

  <!-- Sections du menu -->
  <ng-container *ngFor="let section of menuSections">
    <section class="menu-section mb-5" [@sectionAnimation]>
      <h3 class="section-title text-white mb-4">{{ section.emoji }} {{ section.title }}</h3>
      <div class="scroll-container d-flex gap-4">
        <div class="card menu-card" *ngFor="let item of section.items" [@listAnimation]>
          <div class="card-img-wrapper">
            <img [src]="item.image" class="card-img-top" alt="{{ item.nom }}">
          </div>
          <div class="card-body text-center">
            <h5 class="card-title">{{ item.nom }}</h5>
            <p class="card-text text-white-50">{{ item.description }}</p>
            <p class="fw-bold text-warning">{{ item.prix }} DT</p>
          </div>
        </div>
      </div>
    </section>
  </ng-container>

</div>
