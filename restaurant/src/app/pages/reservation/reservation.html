<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Restaurant Reservation</title>
    <link rel="stylesheet" href="reservation.css">

    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <div class="container mt-5">
  <div class="card shadow-lg p-4 rounded-4 card-transparent">

    <h2 class="text-center mb-4 text-dark">Réservation</h2>
    <form (ngSubmit)="onSubmit()" #resForm="ngForm">

      <!-- Nom -->
      <div class="mb-3">
        <label class="form-label">Nom :</label>
        <input type="text" class="form-control rounded-3" name="nom" [(ngModel)]="reservation.nom" required>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Numéro de téléphone :</label>
        <input type="email" class="form-control rounded-3" name="email" [(ngModel)]="reservation.email" required>
      </div>

      <!-- Date & Heure -->
      <div class="row mb-3">
        <div class="col">
          <label class="form-label">Date :</label>
          <input type="date" class="form-control rounded-3" name="date" [(ngModel)]="reservation.date" required>
        </div>
        <div class="col">
          <label class="form-label">Heure :</label>
          <input type="time" class="form-control rounded-3" name="heure" [(ngModel)]="reservation.heure" required>
        </div>
      </div>

      <!-- Nombre de personnes -->
      <div class="mb-3">
        <label class="form-label">Nombre de personnes :</label>
        <input type="number" class="form-control rounded-3" name="personnes" [(ngModel)]="reservation.personnes" required min="1">
      </div>

      <!-- Bouton -->
      <div class="text-center">
        <button type="submit" class="btn btn-dark px-5 py-2 rounded-3 shadow-sm" >
          Réserver
        </button>
      </div>
    </form>
  </div>
</div>

  </body>
</html>
