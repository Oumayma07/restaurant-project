<div class="reservation-page" [@fadeSlide]>

  <!-- Overlay sombre -->
  <div class="overlay"></div>
    <!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top navbar-transparent">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand" routerLink="/home">
      Ô Délices
    </a>

    <!-- Burger menu -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse justify-content-end" id="mainNavbar">
      <ul class="navbar-nav align-items-center gap-3">

        <li class="nav-item">
          <a class="nav-link" routerLink="/home">Accueil</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/menu">Menu</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/about">À propos</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/avis">Avis</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/contact">Contact</a>
        </li>


      </ul>
    </div>
  </div>
</nav>

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card reservation-card shadow-lg p-5 rounded-4">

      <h2 class="text-center mb-4 text-white fw-bold">Réserver votre table 🍽️</h2>

      <form (ngSubmit)="onSubmit()" #resForm="ngForm">

        <!-- Nom -->
        <div class="mb-3">
          <label class="form-label text-white">Nom :</label>
          <input type="text" class="form-control rounded-3" name="nom" [(ngModel)]="reservation.nom" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label text-white">Email :</label>
          <input type="email" class="form-control rounded-3" name="email" [(ngModel)]="reservation.email" required>
        </div>

        <!-- Date & Heure -->
        <div class="row mb-3">
          <div class="col">
            <label class="form-label text-white">Date :</label >
            <input type="date" class="form-control rounded-3" name="date" [(ngModel)]="reservation.dateReservation" required>
          </div>
          <div class="mb-3" *ngIf="reservation.dateReservation">
      <p>Places disponibles pour cette date : 
        <span [ngClass]="{'text-success': disponibilite>0, 'text-danger': disponibilite<=0}">
          {{ disponibilite }}
        </span>
      </p>
    </div>
          <div class="col">
            <label class="form-label text-white">Heure :</label>
            <input type="time" class="form-control rounded-3" name="heure" [(ngModel)]="reservation.heure" required>
          </div>
        </div>

        <!-- Nombre de personnes -->
        <div class="mb-3">
          <label class="form-label text-white">Nombre de personnes :</label>
          <input type="number" class="form-control rounded-3" name="personnes" [(ngModel)]="reservation.nbPersonnes" required min="1">
        </div>

        <!-- Bouton -->
        <div class="text-center mt-4">
          <button type="submit" class="btn btn-reservation px-5 py-2 rounded-3 shadow-sm">
            Réserver
          </button>
        </div>

      </form>

    </div>
  </div>


</div>
